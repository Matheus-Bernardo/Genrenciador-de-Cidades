openapi: 3.0.0
info:
  title: API Locadora de Filmes
  version: 1.0.0
  description: Documentação Swagger para os serviços da Locadora de Filmes
servers:
  - url: http://localhost:3000
paths:
  /clientes:
    get:
      summary: Lista todos os clientes
      responses:
        '200':
          description: Lista de clientes
    post:
      summary: Cadastra um novo cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
              properties:
                nome:
                  type: string
                email:
                  type: string
                  nullable: true
                telefone:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Cliente cadastrado
  /clientes/{id}:
    get:
      summary: Busca cliente por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cliente encontrado
    put:
      summary: Atualiza cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
      responses:
        '200':
          description: Cliente atualizado
    delete:
      summary: Remove cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cliente removido
  /filmes:
    get:
      summary: Lista todos os filmes
      responses:
        '200':
          description: Lista de filmes
    post:
      summary: Cadastra um novo filme
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
              properties:
                titulo:
                  type: string
                diretor:
                  type: string
                ano:
                  type: integer
                disponivel:
                  type: boolean
      responses:
        '201':
          description: Filme cadastrado
  /alugueis:
    get:
      summary: Lista todos os aluguéis
      responses:
        '200':
          description: Lista de aluguéis
    post:
      summary: Realiza um novo aluguel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clienteId
                - filmeId
              properties:
                clienteId:
                  type: integer
                filmeId:
                  type: integer
                dataAluguel:
                  type: string
                  format: date-time
                dataDevolucao:
                  type: string
                  format: date-time
                status:
                  type: string
      responses:
        '201':
          description: Aluguel realizado
